# Luotsi Multi-Agent Configuration
log_level: info
audit_log: "multi_agent_audit.jsonl"
observability_endpoint: "127.0.0.1:9000"
max_token_size: 100000
policies_file: "playground/configs/policies.yaml"

nodes:
  - id: "session_memory"
    is_mcp_server: true
    session_memory: true
    runtime:
      adapter: "stdio"
      command: "docker"
      args: ["run", "-i", "--rm", "-v", "luotsi-session-data:/app/data", "luotsi-session-memory"]

#  - id: "whatsapp_mock"
#    role: "gateway"
#    runtime:
#      adapter: "stdio"
#      command: "docker"
#      args: ["run", "-i", "--rm", "-p", "8080:8080", "luotsi-playground-whatsapp"]
#    routes:
#      - trigger: "whatsapp.message_received"
#        target: "langchain_agent"
#        action: "translate"
#        new_method: "messaging.incoming"

  - id: "wa_gateway"
    role: "gateway"
    runtime:
      adapter: "stdio"
      command: "docker"
      args: ["run", "-i", "--rm", "-p", "8090:8090", "--env-file", "playground/wa-gateway/.env", "luotsi-wa-gateway"]
    routes:
      - trigger: "whatsapp.message_received"
        target: "langchain_agent"
        action: "translate"
        new_method: "messaging.incoming"
        

  - id: "langchain_agent"
    master: true  # <--- CATCH-ALL ROUTING
    is_agent: true
    role: "admin"
    runtime:
      adapter: "stdio"
      command: "docker"
      args: ["run", "-i", "--rm", "-e", "GOOGLE_API_KEY", "luotsi-langchain-agent"]
    depends: ["odoo_mcp", "memory_mcp", "cs_agent", "dummy_mcp"]
    routes:
      - namespace: "messaging"  # Replies back to real gateway
        target: "wa_gateway"

  - id: "cs_agent"
    is_mcp_server: true
    is_agent: true
    role: "cs_worker"
    runtime:
      adapter: stdio
      command: docker
      args: ["run", "-i", "--rm", "-e", "GOOGLE_API_KEY", "luotsi-cs-agent"]
    routes:
      - trigger: "notifications/progress"
        target: "langchain_agent"

  - id: "memory_mcp"
    is_mcp_server: true
    runtime:
      adapter: stdio
      command: docker
      args: ["run", "-i", "--rm", "-v", "luotsi-chroma:/app/chroma_db", "luotsi-memory-mcp"]
    routes:
      - trigger: "notifications/progress"
        target: "langchain_agent"

  - id: "odoo_mcp"
    is_mcp_server: true
    runtime:
      adapter: stdio
      command: docker
      args: ["run", "-i", "--rm", "--env-file", "playground/mcp-odoo/.env", "luotsi-playground-odoo"]
    routes:
      - trigger: "notifications/progress"
        target: "langchain_agent"

  - id: "dummy_mcp"
    is_mcp_server: true
    runtime:
      adapter: "stdio"
      command: "python3"
      args: ["playground/dummy-mcp/dummy_mcp.py"]
    routes:
      - trigger: "notifications/progress"
        target: "langchain_agent"

  - id: "test_port"
    is_mcp_server: true
    runtime:
      adapter: jsonrpc_tcp
      host: "127.0.0.1"
      port: 9998
    routes:
      - trigger: "notifications/progress"
        target: "langchain_agent"
